<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 565" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="565" fill="#FFFFFF"/>

  <!-- Title block -->
  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">
    Figure 1. Distribution of Real Stock Returns — China
  </text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#4A5568">
    Annual real log-returns of the Shanghai Composite Index (SHCOMP), 1991–2024 (n = 34)
  </text>

  <!-- Plot frame: x 90→940, y 110→500. X range −120 to 120 (12 bins of 20 pp = 70.833 px). Y 0–10 (unit = 39 px). -->

  <!-- Horizontal gridlines + Y axis labels (0–10) -->
  <g font-size="11" fill="#4A5568" text-anchor="end">
    <line x1="90" y1="500" x2="940" y2="500" stroke="#2D3748" stroke-width="1"/>
    <line x1="90" y1="461" x2="940" y2="461" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="422" x2="940" y2="422" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="383" x2="940" y2="383" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="344" x2="940" y2="344" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="305" x2="940" y2="305" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="266" x2="940" y2="266" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="227" x2="940" y2="227" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="188" x2="940" y2="188" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="149" x2="940" y2="149" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="110" x2="940" y2="110" stroke="#E2E8F0" stroke-width="1"/>

    <text x="80" y="504">0</text>
    <text x="80" y="465">1</text>
    <text x="80" y="426">2</text>
    <text x="80" y="387">3</text>
    <text x="80" y="348">4</text>
    <text x="80" y="309">5</text>
    <text x="80" y="270">6</text>
    <text x="80" y="231">7</text>
    <text x="80" y="192">8</text>
    <text x="80" y="153">9</text>
    <text x="80" y="114">10</text>
  </g>

  <!-- Y axis title -->
  <text transform="translate(36,305) rotate(-90)" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    Frequency (number of years)
  </text>

  <!-- China bars: crimson #9B2C2C. Frequencies (left→right): 1,0,0,1,5,9,9,1,4,2,2 -->
  <g fill="#9B2C2C" stroke="#742A2A" stroke-width="0.75">
    <rect x="94"     y="461" width="62.83" height="39"/>   <!-- 1 -->
    <rect x="306.5"  y="461" width="62.83" height="39"/>   <!-- 1 -->
    <rect x="377.33" y="305" width="62.83" height="195"/>  <!-- 5 -->
    <rect x="448.17" y="149" width="62.83" height="351"/>  <!-- 9 -->
    <rect x="519"    y="149" width="62.83" height="351"/>  <!-- 9 -->
    <rect x="589.83" y="461" width="62.83" height="39"/>   <!-- 1 -->
    <rect x="660.67" y="344" width="62.83" height="156"/>  <!-- 4 -->
    <rect x="731.5"  y="422" width="62.83" height="78"/>   <!-- 2 -->
    <rect x="802.33" y="422" width="62.83" height="78"/>   <!-- 2 -->
  </g>

  <!-- Value labels -->
  <g font-size="11" fill="#1A202C" text-anchor="middle" font-weight="600">
    <text x="125.42"  y="453">1</text>
    <text x="337.92"  y="453">1</text>
    <text x="408.75"  y="297">5</text>
    <text x="479.58"  y="141">9</text>
    <text x="550.42"  y="141">9</text>
    <text x="621.25"  y="453">1</text>
    <text x="692.08"  y="336">4</text>
    <text x="762.92"  y="414">2</text>
    <text x="833.75"  y="414">2</text>
  </g>

  <!-- X axis ticks at bin edges -120…120 -->
  <g font-size="11" fill="#4A5568" text-anchor="middle">
    <line x1="90"     y1="500" x2="90"     y2="505" stroke="#2D3748"/>
    <line x1="160.83" y1="500" x2="160.83" y2="505" stroke="#2D3748"/>
    <line x1="231.67" y1="500" x2="231.67" y2="505" stroke="#2D3748"/>
    <line x1="302.5"  y1="500" x2="302.5"  y2="505" stroke="#2D3748"/>
    <line x1="373.33" y1="500" x2="373.33" y2="505" stroke="#2D3748"/>
    <line x1="444.17" y1="500" x2="444.17" y2="505" stroke="#2D3748"/>
    <line x1="515"    y1="500" x2="515"    y2="505" stroke="#2D3748"/>
    <line x1="585.83" y1="500" x2="585.83" y2="505" stroke="#2D3748"/>
    <line x1="656.67" y1="500" x2="656.67" y2="505" stroke="#2D3748"/>
    <line x1="727.5"  y1="500" x2="727.5"  y2="505" stroke="#2D3748"/>
    <line x1="798.33" y1="500" x2="798.33" y2="505" stroke="#2D3748"/>
    <line x1="869.17" y1="500" x2="869.17" y2="505" stroke="#2D3748"/>
    <line x1="940"    y1="500" x2="940"    y2="505" stroke="#2D3748"/>

    <text x="90"     y="520">−120</text>
    <text x="160.83" y="520">−100</text>
    <text x="231.67" y="520">−80</text>
    <text x="302.5"  y="520">−60</text>
    <text x="373.33" y="520">−40</text>
    <text x="444.17" y="520">−20</text>
    <text x="515"    y="520">0</text>
    <text x="585.83" y="520">20</text>
    <text x="656.67" y="520">40</text>
    <text x="727.5"  y="520">60</text>
    <text x="798.33" y="520">80</text>
    <text x="869.17" y="520">100</text>
    <text x="940"    y="520">120</text>
  </g>

  <!-- X axis title -->
  <text x="515" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    Real stock return (% per year)
  </text>

  <!-- Median reference line: median = 2.10% → x = 515 + (2.10/20)*70.833 = 522.44 -->
  <line x1="522.44" y1="110" x2="522.44" y2="500" stroke="#2C7A7B" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="518" y="124" font-size="11" fill="#2C7A7B" font-style="italic" text-anchor="end">Median = 2.10% →</text>

  <!-- Mean reference line: mean = 5.94% → x = 515 + (5.94/20)*70.833 = 536.04 -->
  <line x1="536.04" y1="110" x2="536.04" y2="500" stroke="#DD6B20" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="540" y="124" font-size="11" fill="#DD6B20" font-style="italic">← Mean = 5.94%</text>

  <!-- Statistics inset (top-right of plot area) -->
  <g>
    <rect x="772" y="120" width="158" height="118" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1"/>
    <text x="781" y="140" font-size="12" font-weight="700" fill="#1A202C">Summary statistics</text>
    <line x1="781" y1="146" x2="921" y2="146" stroke="#CBD5E0" stroke-width="1"/>
    <g font-size="11" fill="#1A202C">
      <text x="781" y="162">Observations</text><text x="921" y="162" text-anchor="end">34</text>
      <text x="781" y="178">Mean</text>        <text x="921" y="178" text-anchor="end">5.94%</text>
      <text x="781" y="194">Median</text>      <text x="921" y="194" text-anchor="end">2.10%</text>
      <text x="781" y="210">Std. dev.</text>   <text x="921" y="210" text-anchor="end">40.76%</text>
      <text x="781" y="226">Skewness</text>    <text x="921" y="226" text-anchor="end">−0.06</text>
    </g>
  </g>
</svg>
