<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 565" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="565" fill="#FFFFFF"/>

  <!-- Title block -->
  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">
    Figure 4. Distribution of GDP Growth — United Kingdom
  </text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#4A5568">
    Annual log-difference of real GDP per capita (constant 2010 USD), 1984–2024 (n = 41)
  </text>

  <!-- Plot frame: x 90→940, y 110→500. X range −15 to 15 (12 bins of 2.5 pp = 70.833 px). Y 0–25 step 5 (unit = 15.6 px). -->

  <!-- Horizontal gridlines + Y axis labels (0,5,10,15,20,25) -->
  <g font-size="11" fill="#4A5568" text-anchor="end">
    <line x1="90" y1="500" x2="940" y2="500" stroke="#2D3748" stroke-width="1"/>
    <line x1="90" y1="422" x2="940" y2="422" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="344" x2="940" y2="344" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="266" x2="940" y2="266" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="188" x2="940" y2="188" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="110" x2="940" y2="110" stroke="#E2E8F0" stroke-width="1"/>

    <text x="80" y="504">0</text>
    <text x="80" y="426">5</text>
    <text x="80" y="348">10</text>
    <text x="80" y="270">15</text>
    <text x="80" y="192">20</text>
    <text x="80" y="114">25</text>
  </g>

  <!-- Y axis title -->
  <text transform="translate(36,305) rotate(-90)" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    Frequency (number of years)
  </text>

  <!-- UK bars: navy #2C5282. Frequencies (left→right at upper-edge labels): 0,0,1,0,1,0,3,22,13,0,1,0 -->
  <g fill="#2C5282" stroke="#1A365D" stroke-width="0.75">
    <rect x="164.83" y="484.4" width="62.83" height="15.6"/>   <!-- 1  → (-12.5,-10] -->
    <rect x="306.5"  y="484.4" width="62.83" height="15.6"/>   <!-- 1  → (-7.5,-5]   -->
    <rect x="448.17" y="453.2" width="62.83" height="46.8"/>   <!-- 3  → (-2.5,0]    -->
    <rect x="519"    y="156.8" width="62.83" height="343.2"/>  <!-- 22 → (0,2.5]     -->
    <rect x="589.83" y="297.2" width="62.83" height="202.8"/>  <!-- 13 → (2.5,5]     -->
    <rect x="731.5"  y="484.4" width="62.83" height="15.6"/>   <!-- 1  → (7.5,10]    -->
  </g>

  <!-- Value labels above bars -->
  <g font-size="11" fill="#1A202C" text-anchor="middle" font-weight="600">
    <text x="196.25" y="476.4">1</text>
    <text x="337.92" y="476.4">1</text>
    <text x="479.58" y="445.2">3</text>
    <text x="550.42" y="148.8">22</text>
    <text x="621.25" y="289.2">13</text>
    <text x="762.92" y="476.4">1</text>
  </g>

  <!-- X axis ticks at bin edges -15,-12.5,...,15 -->
  <g font-size="11" fill="#4A5568" text-anchor="middle">
    <line x1="90"     y1="500" x2="90"     y2="505" stroke="#2D3748"/>
    <line x1="160.83" y1="500" x2="160.83" y2="505" stroke="#2D3748"/>
    <line x1="231.67" y1="500" x2="231.67" y2="505" stroke="#2D3748"/>
    <line x1="302.5"  y1="500" x2="302.5"  y2="505" stroke="#2D3748"/>
    <line x1="373.33" y1="500" x2="373.33" y2="505" stroke="#2D3748"/>
    <line x1="444.17" y1="500" x2="444.17" y2="505" stroke="#2D3748"/>
    <line x1="515"    y1="500" x2="515"    y2="505" stroke="#2D3748"/>
    <line x1="585.83" y1="500" x2="585.83" y2="505" stroke="#2D3748"/>
    <line x1="656.67" y1="500" x2="656.67" y2="505" stroke="#2D3748"/>
    <line x1="727.5"  y1="500" x2="727.5"  y2="505" stroke="#2D3748"/>
    <line x1="798.33" y1="500" x2="798.33" y2="505" stroke="#2D3748"/>
    <line x1="869.17" y1="500" x2="869.17" y2="505" stroke="#2D3748"/>
    <line x1="940"    y1="500" x2="940"    y2="505" stroke="#2D3748"/>

    <text x="90"     y="520">−15</text>
    <text x="160.83" y="520">−12.5</text>
    <text x="231.67" y="520">−10</text>
    <text x="302.5"  y="520">−7.5</text>
    <text x="373.33" y="520">−5</text>
    <text x="444.17" y="520">−2.5</text>
    <text x="515"    y="520">0</text>
    <text x="585.83" y="520">2.5</text>
    <text x="656.67" y="520">5</text>
    <text x="727.5"  y="520">7.5</text>
    <text x="798.33" y="520">10</text>
    <text x="869.17" y="520">12.5</text>
    <text x="940"    y="520">15</text>
  </g>

  <!-- X axis title -->
  <text x="515" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    GDP per-capita growth (% per year)
  </text>

  <!-- Mean reference line: mean = 1.65 → x = 90 + ((1.65+15)/30)*850 = 561.75 -->
  <line x1="561.75" y1="110" x2="561.75" y2="500" stroke="#DD6B20" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="557" y="124" font-size="11" fill="#DD6B20" font-style="italic" text-anchor="end">Mean = 1.65% →</text>

  <!-- Median reference line: median = 1.99 → x = 90 + ((1.99+15)/30)*850 = 571.38 -->
  <line x1="571.38" y1="110" x2="571.38" y2="500" stroke="#2C7A7B" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="575" y="124" font-size="11" fill="#2C7A7B" font-style="italic">← Median = 1.99%</text>

  <!-- Statistics inset (top-left of plot area) -->
  <g>
    <rect x="100" y="120" width="158" height="118" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1"/>
    <text x="109" y="140" font-size="12" font-weight="700" fill="#1A202C">Summary statistics</text>
    <line x1="109" y1="146" x2="249" y2="146" stroke="#CBD5E0" stroke-width="1"/>
    <g font-size="11" fill="#1A202C">
      <text x="109" y="162">Observations</text><text x="249" y="162" text-anchor="end">41</text>
      <text x="109" y="178">Mean</text>        <text x="249" y="178" text-anchor="end">1.65%</text>
      <text x="109" y="194">Median</text>      <text x="249" y="194" text-anchor="end">1.99%</text>
      <text x="109" y="210">Std. dev.</text>   <text x="249" y="210" text-anchor="end">2.91%</text>
      <text x="109" y="226">Skewness</text>    <text x="249" y="226" text-anchor="end">−2.09</text>
    </g>
  </g>
</svg>
