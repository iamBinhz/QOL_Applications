<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 565" font-family="Arial, sans-serif">
  <rect width="1000" height="565" fill="#FFFFFF"/>

  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">
    Figure 8. Scatter Plot of GDP Growth vs. Lagged Stock Returns — United Kingdom
  </text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#4A5568">
    Annual observations, 1985–2024 (n = 40). Trendline: simple OLS regression of Dy_t on r_{t−1}.
  </text>

  <!-- Plot area: x 100→760 (660 wide), y 110→480 (370 tall). X range −45 to 30 (1 unit = 8.8 px). Y −12 to 8 (1 unit = 18.5 px). -->

  <!-- Y gridlines + labels (-12,-8,-4,0,4,8) -->
  <g font-size="11" fill="#4A5568" text-anchor="end">
    <line x1="100" y1="480" x2="760" y2="480" stroke="#2D3748" stroke-width="1"/>
    <line x1="100" y1="406" x2="760" y2="406" stroke="#E2E8F0"/>
    <line x1="100" y1="332" x2="760" y2="332" stroke="#E2E8F0"/>
    <line x1="100" y1="258" x2="760" y2="258" stroke="#1A202C" stroke-width="1"/>
    <line x1="100" y1="184" x2="760" y2="184" stroke="#E2E8F0"/>
    <line x1="100" y1="110" x2="760" y2="110" stroke="#E2E8F0"/>

    <text x="92" y="484">−12</text>
