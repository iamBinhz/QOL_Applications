    <text x="92" y="336">−4</text>
    <text x="92" y="262">0</text>
    <text x="92" y="188">4</text>
    <text x="92" y="114">8</text>
  </g>

  <text transform="translate(46,295) rotate(-90)" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    GDP per-capita growth Dy_t (% per year)
  </text>

  <!-- X axis ticks at −40,−30,…,30 -->
  <g font-size="11" fill="#4A5568" text-anchor="middle">
    <line x1="144" y1="480" x2="144" y2="485" stroke="#2D3748"/>
    <line x1="232" y1="480" x2="232" y2="485" stroke="#2D3748"/>
    <line x1="320" y1="480" x2="320" y2="485" stroke="#2D3748"/>
