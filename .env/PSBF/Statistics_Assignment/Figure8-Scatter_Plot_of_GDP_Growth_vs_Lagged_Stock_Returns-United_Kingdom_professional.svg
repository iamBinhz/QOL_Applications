  <text x="430" y="528" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    Previous-year real stock return r_{t−1} (% per year)
  </text>

  <!-- Vertical reference at x = 0 -->
  <line x1="496" y1="110" x2="496" y2="480" stroke="#A0AEC0" stroke-width="1" stroke-dasharray="2,3"/>

