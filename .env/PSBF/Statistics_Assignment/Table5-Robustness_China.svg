<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 316" font-family="Arial, sans-serif">
  <rect width="1000" height="316" fill="#FFFFFF"/>

  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">
    Table 5. Robustness Analysis — Regression with Lagged GDP Growth Included (China)
  </text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#4A5568">
    Dependent variable: Dy_t. OLS estimates of Dy_t = α + β₁·r_{t−1} + β₂·Dy_{t−1} + ε_t
  </text>

  <!-- Top border -->
  <line x1="120" y1="100" x2="880" y2="100" stroke="#1A202C" stroke-width="1.5"/>

  <!-- Header row (China crimson) -->
  <rect x="120" y="100" width="760" height="28" fill="#FCEEEE"/>
  <text x="135" y="120" font-size="13" font-weight="700" fill="#1A202C">Variable</text>
  <text x="475" y="120" text-anchor="end" font-size="13" font-weight="700" fill="#1A202C">Coefficient</text>
  <text x="610" y="120" text-anchor="end" font-size="13" font-weight="700" fill="#1A202C">Std. Error</text>
  <text x="745" y="120" text-anchor="end" font-size="13" font-weight="700" fill="#1A202C">t-statistic</text>
  <text x="870" y="120" text-anchor="end" font-size="13" font-weight="700" fill="#1A202C">p-value</text>
  <line x1="120" y1="128" x2="880" y2="128" stroke="#1A202C" stroke-width="1"/>

  <!-- Coefficient rows -->
  <g font-size="12" fill="#1A202C">
    <text x="135" y="148">Intercept (α)</text>
    <text x="475" y="148" text-anchor="end">2.8059</text>
    <text x="610" y="148" text-anchor="end">1.1623</text>
    <text x="745" y="148" text-anchor="end">2.414</text>
    <text x="870" y="148" text-anchor="end">0.022</text>

    <rect x="120" y="156" width="760" height="26" fill="#FAFBFC"/>
    <text x="135" y="174">r_CN(−1)</text>
    <text x="475" y="174" text-anchor="end">0.0098</text>
    <text x="610" y="174" text-anchor="end">0.0082</text>
    <text x="745" y="174" text-anchor="end">1.186</text>
    <text x="870" y="174" text-anchor="end">0.245</text>

    <text x="135" y="200">Dy_CN(−1)</text>
    <text x="475" y="200" text-anchor="end">0.6282</text>
    <text x="610" y="200" text-anchor="end">0.1418</text>
    <text x="745" y="200" text-anchor="end">4.430</text>
    <text x="870" y="200" text-anchor="end">&lt; 0.001</text>
  </g>

  <!-- Divider before model statistics -->
  <line x1="120" y1="216" x2="880" y2="216" stroke="#CBD5E0" stroke-width="1"/>

  <!-- Model stats footer rows -->
  <g font-size="12" fill="#1A202C">
    <text x="135" y="236" font-weight="600">R²</text>
    <text x="475" y="236" text-anchor="end" font-weight="600">0.4411</text>

    <text x="135" y="258" font-weight="600">F-statistic</text>
    <text x="475" y="258" text-anchor="end" font-weight="600">11.840</text>
    <text x="610" y="258" text-anchor="end" fill="#4A5568">Prob (F-stat)</text>
    <text x="870" y="258" text-anchor="end" font-weight="600">&lt; 0.001</text>

    <text x="135" y="280" font-weight="600">Observations</text>
    <text x="475" y="280" text-anchor="end" font-weight="600">33</text>
  </g>

  <line x1="120" y1="292" x2="880" y2="292" stroke="#1A202C" stroke-width="1.5"/>
</svg>
