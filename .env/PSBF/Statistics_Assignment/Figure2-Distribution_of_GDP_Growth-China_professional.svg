<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 565" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="565" fill="#FFFFFF"/>

  <!-- Title block -->
  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">
    Figure 2. Distribution of GDP Growth — China
  </text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#4A5568">
    Annual log-difference of real GDP per capita (constant 2010 USD), 1991–2024 (n = 34)
  </text>

  <!-- Plot frame: x 90→940, y 110→500. Y range 0–14, 1 unit = 27.857 px. -->

  <!-- Horizontal gridlines + Y axis labels (0,2,4,…,14) -->
  <g font-size="11" fill="#4A5568" text-anchor="end">
    <line x1="90" y1="500"    x2="940" y2="500"    stroke="#2D3748" stroke-width="1"/>
    <line x1="90" y1="444.29" x2="940" y2="444.29" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="388.57" x2="940" y2="388.57" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="332.86" x2="940" y2="332.86" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="277.14" x2="940" y2="277.14" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="221.43" x2="940" y2="221.43" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="165.71" x2="940" y2="165.71" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="110"    x2="940" y2="110"    stroke="#E2E8F0" stroke-width="1"/>

    <text x="80" y="504">0</text>
    <text x="80" y="448">2</text>
    <text x="80" y="393">4</text>
    <text x="80" y="337">6</text>
    <text x="80" y="281">8</text>
    <text x="80" y="225">10</text>
    <text x="80" y="170">12</text>
    <text x="80" y="114">14</text>
  </g>

  <!-- Y axis title -->
  <text transform="translate(36,305) rotate(-90)" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    Frequency (number of years)
  </text>

  <!-- Bars: 9 bins each 2.5 pp wide → bin width = 94.44 px, bar inset 4 px each side -->
  <!-- Frequencies: 1, 2, 13, 12, 5, 1, 0, 0 (skipping leading bin at 0 with freq 0) -->
  <!-- Bar height per unit = 27.857 -->
  <g fill="#9B2C2C" stroke="#742A2A" stroke-width="0.75">
    <rect x="94"     y="472.14" width="86.44" height="27.86"/>   <!-- 1  → bin (0, 2.5]   -->
    <rect x="188.44" y="444.29" width="86.44" height="55.71"/>   <!-- 2  → bin (2.5, 5]   -->
    <rect x="282.89" y="137.86" width="86.44" height="362.14"/>  <!-- 13 → bin (5, 7.5]   -->
    <rect x="377.33" y="165.71" width="86.44" height="334.29"/>  <!-- 12 → bin (7.5, 10]  -->
    <rect x="471.78" y="360.71" width="86.44" height="139.29"/>  <!-- 5  → bin (10, 12.5] -->
    <rect x="566.22" y="472.14" width="86.44" height="27.86"/>   <!-- 1  → bin (12.5, 15] -->
    <!-- (15, 17.5] = 0, (17.5, 20] = 0 → omitted -->
  </g>

  <!-- Value labels above bars -->
  <g font-size="11" fill="#1A202C" text-anchor="middle" font-weight="600">
    <text x="137.22" y="464">1</text>
    <text x="231.67" y="436">2</text>
    <text x="326.11" y="130">13</text>
    <text x="420.56" y="158">12</text>
    <text x="515"    y="353">5</text>
    <text x="609.44" y="464">1</text>
  </g>

  <!-- X axis ticks at bin edges 0, 2.5, 5, 7.5, 10, 12.5, 15, 17.5, 20 -->
  <g font-size="11" fill="#4A5568" text-anchor="middle">
    <line x1="90"     y1="500" x2="90"     y2="505" stroke="#2D3748"/>
    <line x1="184.44" y1="500" x2="184.44" y2="505" stroke="#2D3748"/>
    <line x1="278.89" y1="500" x2="278.89" y2="505" stroke="#2D3748"/>
    <line x1="373.33" y1="500" x2="373.33" y2="505" stroke="#2D3748"/>
    <line x1="467.78" y1="500" x2="467.78" y2="505" stroke="#2D3748"/>
    <line x1="562.22" y1="500" x2="562.22" y2="505" stroke="#2D3748"/>
    <line x1="656.67" y1="500" x2="656.67" y2="505" stroke="#2D3748"/>
    <line x1="751.11" y1="500" x2="751.11" y2="505" stroke="#2D3748"/>
    <line x1="845.56" y1="500" x2="845.56" y2="505" stroke="#2D3748"/>
    <line x1="940"    y1="500" x2="940"    y2="505" stroke="#2D3748"/>

    <text x="90"     y="520">0</text>
    <text x="184.44" y="520">2.5</text>
    <text x="278.89" y="520">5</text>
    <text x="373.33" y="520">7.5</text>
    <text x="467.78" y="520">10</text>
    <text x="562.22" y="520">12.5</text>
    <text x="656.67" y="520">15</text>
    <text x="751.11" y="520">17.5</text>
    <text x="845.56" y="520">20</text>
  </g>

  <!-- X axis title -->
  <text x="515" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    GDP per-capita growth (% per year)
  </text>

  <!-- Median reference line: median = 7.72 → x = 90 + 7.72 * 42.5 = 418.10 -->
  <line x1="418.10" y1="110" x2="418.10" y2="500" stroke="#2C7A7B" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="414" y="124" font-size="11" fill="#2C7A7B" font-style="italic" text-anchor="end">Median = 7.72% →</text>

  <!-- Mean reference line: mean = 7.83 → x = 90 + 7.83 * 42.5 = 422.78 -->
  <line x1="422.78" y1="110" x2="422.78" y2="500" stroke="#DD6B20" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="427" y="124" font-size="11" fill="#DD6B20" font-style="italic">← Mean = 7.83%</text>

  <!-- Statistics inset (top-right of plot area) -->
  <g>
    <rect x="772" y="120" width="158" height="118" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1"/>
    <text x="781" y="140" font-size="12" font-weight="700" fill="#1A202C">Summary statistics</text>
    <line x1="781" y1="146" x2="921" y2="146" stroke="#CBD5E0" stroke-width="1"/>
    <g font-size="11" fill="#1A202C">
      <text x="781" y="162">Observations</text><text x="921" y="162" text-anchor="end">34</text>
      <text x="781" y="178">Mean</text>        <text x="921" y="178" text-anchor="end">7.83%</text>
      <text x="781" y="194">Median</text>      <text x="921" y="194" text-anchor="end">7.72%</text>
      <text x="781" y="210">Std. dev.</text>   <text x="921" y="210" text-anchor="end">2.42%</text>
      <text x="781" y="226">Skewness</text>    <text x="921" y="226" text-anchor="end">≈ 0.00</text>
    </g>
  </g>

</svg>
