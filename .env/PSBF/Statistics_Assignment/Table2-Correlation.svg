<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" font-family="Arial, sans-serif">
  <rect width="1000" height="240" fill="#FFFFFF"/>

  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">
    Table 2. Correlation between Lagged Stock Returns and GDP Growth
  </text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#4A5568">
    Pearson correlation coefficient between r_{t−1} and Dy_t, paired observations
  </text>

  <!-- Top border -->
  <line x1="220" y1="100" x2="780" y2="100" stroke="#1A202C" stroke-width="1.5"/>

  <!-- Header row -->
  <rect x="450" y="100" width="165" height="28" fill="#FCEEEE"/>
  <rect x="615" y="100" width="165" height="28" fill="#EAF0F7"/>
  <text x="230" y="120" font-size="13" font-weight="700" fill="#1A202C">Statistic</text>
  <text x="532" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#9B2C2C">China</text>
  <text x="697" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#2C5282">United Kingdom</text>
  <line x1="220" y1="128" x2="780" y2="128" stroke="#1A202C" stroke-width="1"/>

  <!-- Data rows -->
  <rect x="220" y="128" width="560" height="32" fill="#FAFBFC"/>

  <g font-size="12" fill="#1A202C">
    <text x="230" y="148">Correlation coefficient (r)</text>
    <text x="600" y="148" text-anchor="end">0.275</text>
    <text x="765" y="148" text-anchor="end">0.223</text>

    <text x="230" y="180" font-weight="600">Observations (paired, lagged)</text>
    <text x="600" y="180" text-anchor="end" font-weight="600">33</text>
    <text x="765" y="180" text-anchor="end" font-weight="600">40</text>
  </g>

  <line x1="220" y1="192" x2="780" y2="192" stroke="#1A202C" stroke-width="1.5"/>
</svg>
