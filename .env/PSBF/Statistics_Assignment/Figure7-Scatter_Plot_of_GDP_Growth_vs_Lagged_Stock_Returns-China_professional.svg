  <text x="880" y="285" text-anchor="middle" font-size="11" font-weight="600" fill="#DD6B20">— Trendline: ŷ = 0.0163x + 7.74</text>
  <text x="880" y="302" text-anchor="middle" font-size="11" fill="#4A5568">n = 33 (1992–2024)</text>
