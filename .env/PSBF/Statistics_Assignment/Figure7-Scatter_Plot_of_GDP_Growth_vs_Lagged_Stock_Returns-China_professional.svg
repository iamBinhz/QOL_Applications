  <!-- Statistics / regression inset (top-right) -->
  <g>
    <rect x="780" y="120" width="200" height="148" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1"/>
    <text x="880" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#1A202C">Regression output</text>
    <line x1="788" y1="146" x2="972" y2="146" stroke="#CBD5E0"/>
    <text x="788" y="164" font-size="11" font-style="italic" fill="#1A202C">Dy_t = α + β·r_{t−1}</text>
    <g font-size="11" fill="#1A202C">
      <text x="788" y="184">Intercept (α)</text>  <text x="962" y="184" text-anchor="end">7.7386</text>
      <text x="788" y="202">Slope (β)</text>      <text x="962" y="202" text-anchor="end">0.0163</text>
      <text x="788" y="220">R²</text>             <text x="962" y="220" text-anchor="end">0.0755</text>
      <text x="788" y="238">t-stat (β)</text>    <text x="962" y="238" text-anchor="end">1.591</text>
      <text x="788" y="256">p-value (β)</text>   <text x="962" y="256" text-anchor="end">0.122</text>
    </g>
