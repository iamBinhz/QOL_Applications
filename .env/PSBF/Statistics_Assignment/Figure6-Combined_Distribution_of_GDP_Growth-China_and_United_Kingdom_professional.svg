<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 565" font-family="Arial, sans-serif">
  <rect width="1000" height="565" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">
    Figure 6. Combined Distribution of GDP Growth — China &amp; United Kingdom
  </text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#4A5568">
    Box plots of annual real GDP per-capita growth (1991–2024 for China, n = 34; 1984–2024 for UK, n = 41)
  </text>

  <!-- Plot frame: x 150→750, y 110→500. Y range −15 to 15, 1 unit = 13 px -->

  <g font-size="11" fill="#4A5568" text-anchor="end">
    <line x1="150" y1="500" x2="750" y2="500" stroke="#2D3748" stroke-width="1"/>
    <line x1="150" y1="435" x2="750" y2="435" stroke="#E2E8F0"/>
    <line x1="150" y1="370" x2="750" y2="370" stroke="#E2E8F0"/>
    <line x1="150" y1="305" x2="750" y2="305" stroke="#1A202C" stroke-width="1"/>
    <line x1="150" y1="240" x2="750" y2="240" stroke="#E2E8F0"/>
    <line x1="150" y1="175" x2="750" y2="175" stroke="#E2E8F0"/>
    <line x1="150" y1="110" x2="750" y2="110" stroke="#E2E8F0"/>

    <text x="140" y="504">−15</text>
    <text x="140" y="439">−10</text>
    <text x="140" y="374">−5</text>
    <text x="140" y="309">0</text>
    <text x="140" y="244">5</text>
    <text x="140" y="179">10</text>
    <text x="140" y="114">15</text>
  </g>

  <text transform="translate(76,305) rotate(-90)" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    GDP per-capita growth (% per year)
  </text>

  <!-- ===== China box plot (crimson), centered at x=315 ===== -->
  <g>
    <!-- Whisker lines (above box and below box) -->
    <line x1="315" y1="139.77" x2="315" y2="186.18" stroke="#742A2A" stroke-width="1.5"/>
    <line x1="315" y1="225.18" x2="315" y2="277.96" stroke="#742A2A" stroke-width="1.5"/>
    <line x1="285" y1="139.77" x2="345" y2="139.77" stroke="#742A2A" stroke-width="1.5"/>
    <line x1="285" y1="277.96" x2="345" y2="277.96" stroke="#742A2A" stroke-width="1.5"/>
    <!-- Box -->
    <rect x="255" y="186.18" width="120" height="39" fill="#9B2C2C" fill-opacity="0.85" stroke="#742A2A" stroke-width="1.25"/>
    <!-- Median -->
    <line x1="255" y1="204.64" x2="375" y2="204.64" stroke="#1A202C" stroke-width="2"/>
    <!-- Mean × marker -->
    <line x1="307" y1="195.21" x2="323" y2="211.21" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="307" y1="211.21" x2="323" y2="195.21" stroke="#FFFFFF" stroke-width="2.5"/>
  </g>

  <!-- ===== UK box plot (navy), centered at x=585 ===== -->
  <g>
    <line x1="585" y1="244.03" x2="585" y2="263.40" stroke="#1A365D" stroke-width="1.5"/>
    <line x1="585" y1="293.17" x2="585" y2="325.93" stroke="#1A365D" stroke-width="1.5"/>
    <line x1="555" y1="244.03" x2="615" y2="244.03" stroke="#1A365D" stroke-width="1.5"/>
    <line x1="555" y1="325.93" x2="615" y2="325.93" stroke="#1A365D" stroke-width="1.5"/>
    <rect x="525" y="263.40" width="120" height="29.77" fill="#2C5282" fill-opacity="0.85" stroke="#1A365D" stroke-width="1.25"/>
    <line x1="525" y1="279.13" x2="645" y2="279.13" stroke="#1A202C" stroke-width="2"/>
    <line x1="577" y1="275.55" x2="593" y2="291.55" stroke="#FFFFFF" stroke-width="2.5"/>
    <line x1="577" y1="291.55" x2="593" y2="275.55" stroke="#FFFFFF" stroke-width="2.5"/>
    <!-- Outliers -->
    <circle cx="585" cy="203.08" r="4" fill="none" stroke="#1A365D" stroke-width="1.5"/>
    <text x="595" y="206" font-size="10" fill="#4A5568">7.84 (2021)</text>
    <circle cx="585" cy="375.85" r="4" fill="none" stroke="#1A365D" stroke-width="1.5"/>
    <text x="595" y="379" font-size="10" fill="#4A5568">−5.45 (2009)</text>
    <circle cx="585" cy="444.88" r="4" fill="none" stroke="#1A365D" stroke-width="1.5"/>
    <text x="595" y="448" font-size="10" fill="#4A5568">−10.76 (2020)</text>
  </g>

  <!-- Group labels (X axis) -->
  <g font-size="13" fill="#1A202C" text-anchor="middle" font-weight="700">
    <text x="315" y="525">China (Dy_CN)</text>
    <text x="585" y="525">United Kingdom (Dy_GB)</text>
  </g>

  <!-- ===== Statistics inset (right side, comparison) ===== -->
  <g>
    <rect x="780" y="120" width="200" height="270" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1"/>
    <text x="880" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#1A202C">Five-number summary</text>
    <line x1="788" y1="146" x2="972" y2="146" stroke="#CBD5E0"/>
    <text x="878" y="162" text-anchor="end" font-size="11" font-weight="700" fill="#9B2C2C">China</text>
    <text x="962" y="162" text-anchor="end" font-size="11" font-weight="700" fill="#2C5282">UK</text>
    <line x1="788" y1="168" x2="972" y2="168" stroke="#E2E8F0"/>
    <g font-size="11" fill="#1A202C">
      <text x="788" y="184">Min</text>      <text x="878" y="184" text-anchor="end">2.08</text>  <text x="962" y="184" text-anchor="end">−10.76</text>
      <text x="788" y="202">Q1</text>       <text x="878" y="202" text-anchor="end">6.14</text>  <text x="962" y="202" text-anchor="end">0.91</text>
      <text x="788" y="220">Median</text>   <text x="878" y="220" text-anchor="end">7.72</text>  <text x="962" y="220" text-anchor="end">1.99</text>
      <text x="788" y="238">Mean</text>     <text x="878" y="238" text-anchor="end">7.83</text>  <text x="962" y="238" text-anchor="end">1.65</text>
      <text x="788" y="256">Q3</text>       <text x="878" y="256" text-anchor="end">9.14</text>  <text x="962" y="256" text-anchor="end">3.20</text>
      <text x="788" y="274">Max</text>      <text x="878" y="274" text-anchor="end">12.71</text> <text x="962" y="274" text-anchor="end">7.84</text>
      <text x="788" y="292">SD</text>       <text x="878" y="292" text-anchor="end">2.42</text>  <text x="962" y="292" text-anchor="end">2.91</text>
      <text x="788" y="310">n</text>        <text x="878" y="310" text-anchor="end">34</text>    <text x="962" y="310" text-anchor="end">41</text>
    </g>
    <line x1="788" y1="328" x2="972" y2="328" stroke="#E2E8F0"/>
    <text x="788" y="345" font-size="11" font-weight="700" fill="#1A202C">Box plot legend</text>
    <line x1="792" y1="356" x2="808" y2="356" stroke="#1A202C" stroke-width="2"/>
    <text x="814" y="360" font-size="10" fill="#4A5568">Median</text>
    <g transform="translate(800,372)">
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#1A202C" stroke-width="2"/>
      <line x1="-6" y1="6" x2="6" y2="-6" stroke="#1A202C" stroke-width="2"/>
    </g>
    <text x="814" y="376" font-size="10" fill="#4A5568">Mean (×)</text>
    <circle cx="800" cy="386" r="4" fill="none" stroke="#4A5568" stroke-width="1.5"/>
    <text x="814" y="390" font-size="10" fill="#4A5568">Outlier (&gt;1.5×IQR)</text>
  </g>
</svg>
