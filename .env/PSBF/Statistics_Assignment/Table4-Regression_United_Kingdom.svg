<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 290" font-family="Arial, sans-serif">
  <rect width="1000" height="290" fill="#FFFFFF"/>

  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">
    Table 4. Regression of GDP Growth on Lagged Stock Returns — United Kingdom
  </text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#4A5568">
    Dependent variable: Dy_t. OLS estimates of Dy_t = α + β·r_{t−1} + ε_t
  </text>

  <!-- Top border -->
  <line x1="120" y1="100" x2="880" y2="100" stroke="#1A202C" stroke-width="1.5"/>

  <!-- Header row (UK blue) -->
  <rect x="120" y="100" width="760" height="28" fill="#EAF0F7"/>
  <text x="135" y="120" font-size="13" font-weight="700" fill="#1A202C">Variable</text>
  <text x="475" y="120" text-anchor="end" font-size="13" font-weight="700" fill="#1A202C">Coefficient</text>
  <text x="610" y="120" text-anchor="end" font-size="13" font-weight="700" fill="#1A202C">Std. Error</text>
  <text x="745" y="120" text-anchor="end" font-size="13" font-weight="700" fill="#1A202C">t-statistic</text>
  <text x="870" y="120" text-anchor="end" font-size="13" font-weight="700" fill="#1A202C">p-value</text>
  <line x1="120" y1="128" x2="880" y2="128" stroke="#1A202C" stroke-width="1"/>

  <!-- Coefficient rows -->
  <g font-size="12" fill="#1A202C">
    <text x="135" y="148">Intercept (α)</text>
    <text x="475" y="148" text-anchor="end">1.5343</text>
    <text x="610" y="148" text-anchor="end">0.4646</text>
    <text x="745" y="148" text-anchor="end">3.302</text>
    <text x="870" y="148" text-anchor="end">0.002</text>

    <rect x="120" y="156" width="760" height="26" fill="#FAFBFC"/>
    <text x="135" y="174">r_GB(−1)</text>
    <text x="475" y="174" text-anchor="end">0.0458</text>
    <text x="610" y="174" text-anchor="end">0.0324</text>
    <text x="745" y="174" text-anchor="end">1.411</text>
    <text x="870" y="174" text-anchor="end">0.166</text>
  </g>

  <!-- Divider before model statistics -->
  <line x1="120" y1="190" x2="880" y2="190" stroke="#CBD5E0" stroke-width="1"/>

  <!-- Model stats footer rows -->
  <g font-size="12" fill="#1A202C">
    <text x="135" y="210" font-weight="600">R²</text>
    <text x="475" y="210" text-anchor="end" font-weight="600">0.0498</text>

    <text x="135" y="232" font-weight="600">F-statistic</text>
    <text x="475" y="232" text-anchor="end" font-weight="600">1.990</text>
    <text x="610" y="232" text-anchor="end" fill="#4A5568">Prob (F-stat)</text>
    <text x="870" y="232" text-anchor="end" font-weight="600">0.166</text>

    <text x="135" y="254" font-weight="600">Observations</text>
    <text x="475" y="254" text-anchor="end" font-weight="600">40</text>
  </g>

  <line x1="120" y1="266" x2="880" y2="266" stroke="#1A202C" stroke-width="1.5"/>
</svg>
