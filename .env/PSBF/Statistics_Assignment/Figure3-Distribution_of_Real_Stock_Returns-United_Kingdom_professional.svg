<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 565" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="1000" height="565" fill="#FFFFFF"/>

  <!-- Title block -->
  <text x="500" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1A202C">
    Figure 3. Distribution of Real Stock Returns — United Kingdom
  </text>
  <text x="500" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#4A5568">
    Annual real log-returns of the FTSE 100 Index (UKX), 1984–2024 (n = 41)
  </text>

  <!-- Plot frame: x 90→940, y 110→500. X range −45 to 30 → 1 unit = 11.333 px. Y 0–9 → unit = 43.33 px. -->

  <!-- Horizontal gridlines + Y axis labels (0–9) -->
  <g font-size="11" fill="#4A5568" text-anchor="end">
    <line x1="90" y1="500"    x2="940" y2="500"    stroke="#2D3748" stroke-width="1"/>
    <line x1="90" y1="456.67" x2="940" y2="456.67" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="413.33" x2="940" y2="413.33" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="370"    x2="940" y2="370"    stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="326.67" x2="940" y2="326.67" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="283.33" x2="940" y2="283.33" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="240"    x2="940" y2="240"    stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="196.67" x2="940" y2="196.67" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="153.33" x2="940" y2="153.33" stroke="#E2E8F0" stroke-width="1"/>
    <line x1="90" y1="110"    x2="940" y2="110"    stroke="#E2E8F0" stroke-width="1"/>

    <text x="80" y="504">0</text>
    <text x="80" y="461">1</text>
    <text x="80" y="417">2</text>
    <text x="80" y="374">3</text>
    <text x="80" y="331">4</text>
    <text x="80" y="287">5</text>
    <text x="80" y="244">6</text>
    <text x="80" y="201">7</text>
    <text x="80" y="157">8</text>
    <text x="80" y="114">9</text>
  </g>

  <!-- Y axis title -->
  <text transform="translate(36,305) rotate(-90)" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    Frequency (number of years)
  </text>

  <!-- UK bars: navy #2C5282. Frequencies: 1,0,0,1,1,3,2,3,3,5,8,8,5,1,0 -->
  <g fill="#2C5282" stroke="#1A365D" stroke-width="0.75">
    <rect x="94"     y="456.67" width="48.67" height="43.33"/>   <!-- 1 → (-45,-40] -->
    <rect x="264"    y="456.67" width="48.67" height="43.33"/>   <!-- 1 → (-30,-25] -->
    <rect x="320.67" y="456.67" width="48.67" height="43.33"/>   <!-- 1 → (-25,-20] -->
    <rect x="377.33" y="370"    width="48.67" height="130"/>     <!-- 3 → (-20,-15] -->
    <rect x="434"    y="413.33" width="48.67" height="86.67"/>   <!-- 2 → (-15,-10] -->
    <rect x="490.67" y="370"    width="48.67" height="130"/>     <!-- 3 → (-10,-5]  -->
    <rect x="547.33" y="370"    width="48.67" height="130"/>     <!-- 3 → (-5,0]    -->
    <rect x="604"    y="283.33" width="48.67" height="216.67"/>  <!-- 5 → (0,5]     -->
    <rect x="660.67" y="153.33" width="48.67" height="346.67"/>  <!-- 8 → (5,10]    -->
    <rect x="717.33" y="153.33" width="48.67" height="346.67"/>  <!-- 8 → (10,15]   -->
    <rect x="774"    y="283.33" width="48.67" height="216.67"/>  <!-- 5 → (15,20]   -->
    <rect x="830.67" y="456.67" width="48.67" height="43.33"/>   <!-- 1 → (20,25]   -->
  </g>

  <!-- Value labels above bars -->
  <g font-size="11" fill="#1A202C" text-anchor="middle" font-weight="600">
    <text x="118.33" y="448.67">1</text>
    <text x="288.33" y="448.67">1</text>
    <text x="345"    y="448.67">1</text>
    <text x="401.67" y="362">3</text>
    <text x="458.33" y="405.33">2</text>
    <text x="515"    y="362">3</text>
    <text x="571.67" y="362">3</text>
    <text x="628.33" y="275.33">5</text>
    <text x="685"    y="145.33">8</text>
    <text x="741.67" y="145.33">8</text>
    <text x="798.33" y="275.33">5</text>
    <text x="855"    y="448.67">1</text>
  </g>

  <!-- X axis ticks at bin edges −45,−40,…,30 -->
  <g font-size="11" fill="#4A5568" text-anchor="middle">
    <line x1="90"     y1="500" x2="90"     y2="505" stroke="#2D3748"/>
    <line x1="146.67" y1="500" x2="146.67" y2="505" stroke="#2D3748"/>
    <line x1="203.33" y1="500" x2="203.33" y2="505" stroke="#2D3748"/>
    <line x1="260"    y1="500" x2="260"    y2="505" stroke="#2D3748"/>
    <line x1="316.67" y1="500" x2="316.67" y2="505" stroke="#2D3748"/>
    <line x1="373.33" y1="500" x2="373.33" y2="505" stroke="#2D3748"/>
    <line x1="430"    y1="500" x2="430"    y2="505" stroke="#2D3748"/>
    <line x1="486.67" y1="500" x2="486.67" y2="505" stroke="#2D3748"/>
    <line x1="543.33" y1="500" x2="543.33" y2="505" stroke="#2D3748"/>
    <line x1="600"    y1="500" x2="600"    y2="505" stroke="#2D3748"/>
    <line x1="656.67" y1="500" x2="656.67" y2="505" stroke="#2D3748"/>
    <line x1="713.33" y1="500" x2="713.33" y2="505" stroke="#2D3748"/>
    <line x1="770"    y1="500" x2="770"    y2="505" stroke="#2D3748"/>
    <line x1="826.67" y1="500" x2="826.67" y2="505" stroke="#2D3748"/>
    <line x1="883.33" y1="500" x2="883.33" y2="505" stroke="#2D3748"/>
    <line x1="940"    y1="500" x2="940"    y2="505" stroke="#2D3748"/>

    <text x="90"     y="520">−45</text>
    <text x="146.67" y="520">−40</text>
    <text x="203.33" y="520">−35</text>
    <text x="260"    y="520">−30</text>
    <text x="316.67" y="520">−25</text>
    <text x="373.33" y="520">−20</text>
    <text x="430"    y="520">−15</text>
    <text x="486.67" y="520">−10</text>
    <text x="543.33" y="520">−5</text>
    <text x="600"    y="520">0</text>
    <text x="656.67" y="520">5</text>
    <text x="713.33" y="520">10</text>
    <text x="770"    y="520">15</text>
    <text x="826.67" y="520">20</text>
    <text x="883.33" y="520">25</text>
    <text x="940"    y="520">30</text>
  </g>

  <!-- X axis title -->
  <text x="515" y="548" text-anchor="middle" font-size="13" font-weight="600" fill="#1A202C">
    Real stock return (% per year)
  </text>

  <!-- Mean reference line: mean = 2.04 → x = 90 + (2.04+45)*11.333 = 623.12 -->
  <line x1="623.12" y1="110" x2="623.12" y2="500" stroke="#DD6B20" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="619" y="124" font-size="11" fill="#DD6B20" font-style="italic" text-anchor="end">Mean = 2.04% →</text>

  <!-- Median reference line: median = 6.12 → x = 90 + (6.12+45)*11.333 = 669.36 -->
  <line x1="669.36" y1="110" x2="669.36" y2="500" stroke="#2C7A7B" stroke-width="1.5" stroke-dasharray="2,2"/>
  <text x="673" y="124" font-size="11" fill="#2C7A7B" font-style="italic">← Median = 6.12%</text>

  <!-- Statistics inset (top-left of plot area) -->
  <g>
    <rect x="100" y="120" width="158" height="118" fill="#FFFFFF" stroke="#CBD5E0" stroke-width="1"/>
    <text x="109" y="140" font-size="12" font-weight="700" fill="#1A202C">Summary statistics</text>
    <line x1="109" y1="146" x2="249" y2="146" stroke="#CBD5E0" stroke-width="1"/>
    <g font-size="11" fill="#1A202C">
      <text x="109" y="162">Observations</text><text x="249" y="162" text-anchor="end">41</text>
      <text x="109" y="178">Mean</text>        <text x="249" y="178" text-anchor="end">2.04%</text>
      <text x="109" y="194">Median</text>      <text x="249" y="194" text-anchor="end">6.12%</text>
      <text x="109" y="210">Std. dev.</text>   <text x="249" y="210" text-anchor="end">14.18%</text>
      <text x="109" y="226">Skewness</text>    <text x="249" y="226" text-anchor="end">−1.05</text>
    </g>
  </g>
</svg>
